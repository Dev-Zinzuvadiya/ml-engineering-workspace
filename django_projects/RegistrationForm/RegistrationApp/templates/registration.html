<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Registration</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top, #0b0f1a, #05060c);
        }

        /* ===== BOOK CONTAINER ===== */
        .book {
            display: flex;
            width: 820px;
            height: 600px;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 255, 200, 0.35);
        }

        /* ===== LEFT PAGE ===== */
        .left-page {
            width: 50%;
            background: linear-gradient(135deg, #5df2ff, #7cff9b);
            padding: 50px;
            color: #041814;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left-page h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .left-page p {
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.85;
        }

        /* ===== RIGHT PAGE ===== */
        .right-page {
            width: 50%;
            background: rgba(20, 25, 45, 0.92);
            backdrop-filter: blur(18px);
            padding: 28px 34px;
            color: #e8fdf5;
        }

        /* ===== TITLE ===== */
        h2 {
            text-align: center;
            margin-bottom: 0.1px;
            background: linear-gradient(90deg, #7CFF9B, #5DF2FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 20px;
        }

        /* ===== LABEL ===== */
        label {
            font-size: 13px;
            color: #c8ffe3;
            display: block;
            margin-top: 6px;
        }

        /* ===== INPUT FIELDS ===== */
        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="password"] {
            width: 100%;
            padding: 8px 10px;
            margin: 4px 0 10px;
            border-radius: 4px;
            border: 1px solid rgba(120, 255, 180, 0.25);
            background: rgba(10, 20, 30, 0.85);
            color: #eafff5;
            transition: border 0.25s, box-shadow 0.25s;
        }

        input[type="text"]:hover,
        input[type="email"]:hover,
        input[type="number"]:hover,
        input[type="password"]:hover {
            border-color: rgb(14, 144, 144);
        }

        input:focus {
            outline: none;
            border-color: #0ff;
            box-shadow: 0 0 0.5px rgb(14, 144, 144);
        }

        /* ===== RADIO & CHECKBOX ===== */
        .gender {
            margin: 8px 0;
            font-size: 13px;
        }

        .gender input {
            accent-color: #0ff;
            margin-right: 4px;
        }

        .terms {
            font-size: 12px;
            margin: 8px 0;
        }

        .terms input {
            accent-color: #0ff;
        }

        /* ===== HOLOGRAPHIC SUBMIT BUTTON ===== */
        .submit-wrap {
            margin-top: 14px;
        }

        .submit-btn {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 8px;

            border: none;
            border-radius: 30px;

            background: #0b1f1a;
            color: #0ff;

            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;

            box-shadow: 0 0 12px rgba(0, 255, 255, 0.45);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .submit-btn span {
            position: relative;
            z-index: 2;
        }

        /* hologram sweep */
        .submit-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -90%;
            width: 200%;
            height: 200%;
            background: linear-gradient(0deg, transparent, transparent 30%, rgba(0, 255, 255, 0.35), transparent 60%);
            transform: rotate(-45deg);
            opacity: 0;
            transition: 0.6s ease;
        }

        .submit-btn:hover {
            transform: scale(1);
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.85);
        }

        .submit-btn:hover::before {
            opacity: 1;
            transform: rotate(-45deg) translateY(190%);
        }

        /* ===== LINK ===== */
        a {
            display: block;
            text-align: center;
            margin-top: 12px;
            color: rgba(0, 255, 255, 0.85);
            font-size: 13px;
            text-decoration: none;
        }

        a:hover {
            text-shadow: 0 0 2px rgba(0, 255, 255, 0.85);
        }
    </style>
</head>

<body>

    <div class="book">

        <!-- LEFT PAGE -->
        <div class="left-page">
            <h1>Welcome!</h1>
            <p>
                Step into the future ✨
                Register yourself and unlock a sleek,
                secure and modern experience.
            </p>
        </div>

        <!-- RIGHT PAGE -->
        <div class="right-page">
            <form method="post">
                {% csrf_token %}

                <h2>Registration</h2>

                <label>Candidate Name</label>
                <input type="text" name="CandidateName" required>

                <label>Email</label>
                <input type="email" name="Email" required>

                <label>Age</label>
                <input type="number" name="Age" required>

                <label>Password</label>
                <input type="password" name="Password" required>

                <label>Confirm Password</label>
                <input type="password" name="ConfirmPassword" required>

                <div class="gender">
                    <label>Gender</label>
                    <input type="radio" name="Gender" value="Male" required> Male
                    <input type="radio" name="Gender" value="Female"> Female
                </div>

                <div class="terms">
                    <label>
                        <input type="checkbox" required>
                        I accept Terms & Conditions
                    </label>
                </div>

                <div class="submit-wrap">
                    <button type="submit" class="submit-btn">
                        <span>REGISTER</span>
                    </button>
                </div>

                <a href="/ShowInfo/">Show</a>
            </form>
        </div>

    </div>

</body>

</html>
