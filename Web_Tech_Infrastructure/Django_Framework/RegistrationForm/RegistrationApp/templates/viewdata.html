<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show Records</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #0b0f1a, #05060c);
            margin: 0;
            padding: 40px;
            color: #e8fdf5;
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            max-width: 1150px;
            margin: auto;
            border-collapse: collapse;
            background: rgba(20, 25, 45, 0.9);
            backdrop-filter: blur(16px);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.35);
        }

        /* ===== HEADER ===== */
        table tr:first-child {
            background: linear-gradient(90deg, #5DF2FF, #7CFF9B);
            color: #041814;
            font-weight: 600;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        /* ===== CELLS ===== */
        td {
            padding: 14px 16px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 255, 255, 0.12);
            font-size: 14px;
            transition: all 0.35s ease;
        }

        /* ===== ROWS ===== */
        tr {
            transition: all 0.35s ease;
        }

        tr:nth-child(even) {
            background: rgba(0, 255, 255, 0.04);
        }

        tr:hover {
            background: linear-gradient(90deg,
                    rgba(0, 255, 255, 0.08),
                    rgba(124, 255, 155, 0.08));
            box-shadow: inset 0 0 12px rgba(0, 255, 255, 0.25);
        }

        /* ===== ACTION BUTTONS ===== */
        a {
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.5px;
            display: inline-block;
            transition: all 0.35s ease;
        }

        /* DELETE */
        a[href*="deleterecords"] {
            color: #fff;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            box-shadow: 0 0 2px rgba(255, 75, 43, 0.6);
        }

        a[href*="deleterecords"]:hover {
            transform: scale(1.08);
            box-shadow: 0 0 2px rgba(255, 75, 43, 0.9);
        }

        /* EDIT */
        a[href*="editrecords"] {
            color: #041814;
            background: linear-gradient(135deg, #5DF2FF, #7CFF9B);
            box-shadow: 0 0 2px rgba(0, 255, 255, 0.6);
        }

        a[href*="editrecords"]:hover {
            transform: scale(1.08);
            box-shadow: 0 0 2px rgba(0, 255, 255, 0.9);
        }

        /* ===== BACK BUTTON ===== */
        .back-link {
            display: block;
            width: fit-content;
            margin: 40px auto 0;
            padding: 12px 28px;

            background: #0b1f1a;
            color: #0ff;

            font-weight: 600;
            border-radius: 30px;
            letter-spacing: 1px;
            text-decoration: none;

            box-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
            transition: all 0.4s ease;
        }

        .back-link:hover {
            transform: scale(1);
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.85);
        }
    </style>
</head>

<body>

    <table>
        <tr>
            <td>Id</td>
            <td>Candidate Name</td>
            <td>Email</td>
            <td>Age</td>
            <td>Password</td>
            <td>Confirm Password</td>
            <td>Delete</td>
            <td>Edit</td>
        </tr>

        {% for info in CivilianceInfoShow %}
        <tr>
            <td>{{info.id}}</td>
            <td>{{info.candidate_name}}</td>
            <td>{{info.email}}</td>
            <td>{{info.age}}</td>
            <td>{{info.password}}</td>
            <td>{{info.confirm_password}}</td>
            <td><a href="/deleterecords/{{info.id}}">Delete</a></td>
            <td><a href="/editrecords/{{info.id}}">Edit</a></td>
        </tr>
        {% endfor %}
    </table>

    <a href="/registration/" class="back-link">Go Back</a>

</body>

</html>
