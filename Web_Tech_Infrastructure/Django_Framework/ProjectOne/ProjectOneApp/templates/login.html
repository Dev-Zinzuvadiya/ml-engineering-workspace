<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top, #1b0f2e, #07040d);
        }

        /* ===== LOGIN CARD ===== */
        .login-card {
            width: 380px;
            background: rgba(25, 12, 45, 0.95);
            backdrop-filter: blur(18px);
            padding: 35px 32px;
            border-radius: 14px;
            box-shadow: 0 0 40px rgba(186, 85, 255, 0.45);
            color: #f2eaff;
        }

        /* ===== TITLE ===== */
        h2 {
            text-align: center;
            margin-bottom: 22px;
            background: linear-gradient(90deg, #e1b7ff, #9fdcff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
        }

        /* ===== LABEL ===== */
        label {
            font-size: 13px;
            color: #e6d8ff;
            display: block;
            margin-top: 14px;
        }

        /* ===== INPUT ===== */
        input {
            width: 100%;
            padding: 10px 12px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid rgba(200, 160, 255, 0.35);
            background: rgba(15, 8, 30, 0.9);
            color: #ffffff;
            transition: 0.3s;
        }

        input:hover {
            border-color: #b56bff;
        }

        input:focus {
            outline: none;
            border-color: #d9a7ff;
            box-shadow: 0 0 5px rgba(186, 85, 255, 0.7);
        }

        /* ===== BUTTON ===== */
        .submit-wrap {
            margin-top: 26px;
        }

        .submit-btn {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #7a3cff, #c77dff);
            color: #140022;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(186, 85, 255, 0.8);
            transition: 0.4s;
        }

        .submit-btn span {
            position: relative;
            z-index: 2;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg,
                    transparent,
                    rgba(255, 255, 255, 0.45),
                    transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .submit-btn:hover::before {
            transform: translateX(100%);
        }

        .submit-btn:hover {
            box-shadow: 0 0 10px rgba(210, 150, 255, 1);
        }

        /* ===== EXTRA LINK ===== */
        .extra-link {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
        }

        .extra-link a {
            color: #caa6ff;
            text-decoration: none;
        }

        .extra-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <form method="post">
            {% csrf_token %}

            <h2>Login</h2>

            <label>Email</label>
            <input type="email" name="Email" required>

            <label>Password</label>
            <input type="password" name="Password" required>

            <div class="submit-wrap">
                <button type="submit" name="login" class="submit-btn">
                    <span>LOGIN</span>
                </button>
            </div>

            <div class="extra-link">
                Don’t have an account?
                <a href="/registerpage/">Register</a>
            </div>
        </form>
    </div>

</body>

</html>
